<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Tsukuyomi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A227;--gold2:#FFD700;--gold3:#8a6e0f;
  --glass:rgba(8,6,0,.72);--glass2:rgba(10,8,0,.94);
  --bd:rgba(201,162,39,.22);--dark:#07060d;--r:9px;
}
html,body{width:100%;height:100%;background:#000;overflow:hidden;
  font-family:'Segoe UI',system-ui,sans-serif;color:#eee}

#W{position:relative;width:100vw;height:100dvh;display:flex;
  align-items:center;justify-content:center;background:#000;
  cursor:none;user-select:none;-webkit-user-select:none}
#W.ui{cursor:default}

video{position:absolute;inset:0;width:100%;height:100%;
  object-fit:contain;display:block;z-index:1}

/* ── Mute banner ── */
#mute-bar{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;align-items:center;gap:10px;
  padding:14px 28px;
  background:var(--glass2);border:1.5px solid var(--gold);
  backdrop-filter:blur(20px);border-radius:12px;
  color:var(--gold2);font-size:15px;font-weight:700;
  cursor:pointer;z-index:40;
  transition:opacity .3s,transform .3s;
  box-shadow:0 8px 40px rgba(0,0,0,.6);
}
#mute-bar svg{width:20px;height:20px;fill:var(--gold2);flex-shrink:0}
#mute-bar.gone{opacity:0;pointer-events:none;transform:translate(-50%,-50%) scale(.92)}

/* ── Spinner ── */
#spinner{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);display:none;z-index:25;pointer-events:none;
}
#spinner svg{width:46px;height:46px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Toast ── */
#toast{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  padding:6px 18px;background:var(--glass);border:1px solid var(--gold);
  backdrop-filter:blur(12px);border-radius:6px;
  font-size:12px;color:var(--gold2);pointer-events:none;
  opacity:0;z-index:80;transition:opacity .2s;white-space:nowrap;
}
#toast.show{opacity:1}

/* ── Center flash ── */
#flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);pointer-events:none;opacity:0;z-index:22;
}
#flash svg{width:64px;height:64px;fill:rgba(255,255,255,.82);
  filter:drop-shadow(0 0 12px var(--gold))}
@keyframes flashAnim{
  0%{transform:translate(-50%,-50%) scale(.5);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1.6);opacity:0}
}
#flash.go{animation:flashAnim .36s ease-out forwards}

/* ── Double-tap ripples ── */
.dtap{position:absolute;top:50%;transform:translateY(-50%);
  pointer-events:none;z-index:20;display:flex;flex-direction:column;
  align-items:center;gap:6px;opacity:0}
#dtap-l{left:16%}#dtap-r{right:16%}
.dtap .ring{width:68px;height:68px;border-radius:50%;
  background:rgba(255,255,255,.14);border:2px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center}
.dtap .ring svg{width:26px;height:26px;fill:#fff}
.dtap .lbl{font-size:11px;font-weight:700;color:#fff;text-shadow:0 1px 4px #000}
@keyframes dtapA{0%{opacity:.85;transform:translateY(-50%) scale(.8)}
  60%{opacity:.65;transform:translateY(-50%) scale(1.05)}
  100%{opacity:0;transform:translateY(-50%) scale(1.2)}}
.dtap.go{animation:dtapA .5s ease-out forwards}

/* ── Vol swipe ── */
#vi{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  background:var(--glass2);border:1px solid var(--bd);
  backdrop-filter:blur(14px);border-radius:10px;
  padding:12px 20px;z-index:45;pointer-events:none;opacity:0;transition:opacity .15s}
#vi.show{opacity:1}
#vi svg{width:22px;height:22px;fill:var(--gold2)}
#vi span{font-size:14px;color:var(--gold2);font-weight:700}

/* ── Skip btn ── */
#skip{
  position:absolute;bottom:92px;right:16px;
  display:none;align-items:center;gap:7px;
  padding:9px 18px;z-index:50;
  background:var(--glass);border:1.5px solid var(--gold);
  backdrop-filter:blur(14px);border-radius:8px;
  color:var(--gold2);font-size:14px;font-weight:700;cursor:pointer;
  transition:background .18s,transform .12s;
}
#skip:hover{background:rgba(201,162,39,.18);transform:scale(1.03)}
#skip svg{width:16px;height:16px;fill:var(--gold2);flex-shrink:0}

/* ── Next-ep overlay ── */
#nxt{position:absolute;inset:0;display:none;
  align-items:center;justify-content:center;
  flex-direction:column;gap:16px;z-index:55;
  background:rgba(0,0,0,.55);backdrop-filter:blur(3px)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#nxt.show{display:flex;animation:fadeIn .4s ease}
#nxt-info{font-size:13px;color:rgba(255,255,255,.6);text-align:center;max-width:260px;line-height:1.5}
#btn-nxt{display:flex;align-items:center;gap:10px;padding:14px 28px;cursor:pointer;
  background:var(--glass);border:1.5px solid var(--gold);
  backdrop-filter:blur(20px);border-radius:10px;
  color:var(--gold2);font-size:16px;font-weight:700;
  transition:background .18s,transform .15s;box-shadow:0 0 24px rgba(201,162,39,.15)}
#btn-nxt:hover{background:rgba(201,162,39,.18);transform:scale(1.04)}
#btn-nxt svg{width:22px;height:22px;fill:var(--gold2)}
#btn-rpl{display:flex;align-items:center;gap:8px;padding:9px 18px;cursor:pointer;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(14px);border-radius:8px;color:#ccc;font-size:13px;
  transition:background .15s,transform .12s}
#btn-rpl:hover{background:rgba(255,255,255,.12);transform:scale(1.03)}
#btn-rpl svg{width:16px;height:16px;fill:#ccc}
#ap-bar{position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--gold);transform-origin:left;transform:scaleX(0);
  transition:none;z-index:56;display:none}

/* ── Controls ── */
#ctrl{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 14px 16px;
  background:linear-gradient(0deg,rgba(0,0,0,.92) 0%,transparent 100%);
  display:flex;flex-direction:column;gap:8px;
  opacity:0;transition:opacity .22s;pointer-events:none;z-index:30;
}
#W.ui #ctrl{opacity:1;pointer-events:all}

/* ── Seek ── */
#seek-row{display:flex;align-items:center;gap:10px;width:100%}
.tt{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap;min-width:42px;text-align:center;
  font-variant-numeric:tabular-nums;font-feature-settings:'tnum'}

#seek{flex:1;height:32px;display:flex;align-items:center;cursor:pointer;
  position:relative;touch-action:none}
#seek-bg{width:100%;height:4px;background:rgba(255,255,255,.12);
  border-radius:4px;position:relative;transition:height .15s}
#seek:hover #seek-bg,#seek.active #seek-bg{height:6px}
#seek-buf,#seek-fill{position:absolute;left:0;top:0;height:100%;border-radius:4px;pointer-events:none}
#seek-buf{background:rgba(201,162,39,.22);width:0}
#seek-fill{background:var(--gold);width:0;box-shadow:0 0 6px rgba(201,162,39,.35)}
#seek-thumb{position:absolute;top:50%;
  width:14px;height:14px;background:var(--gold2);border-radius:50%;
  transform:translate(-50%,-50%) scale(0);transition:transform .12s;pointer-events:none;
  box-shadow:0 0 8px var(--gold)}
#seek:hover #seek-thumb,#seek.active #seek-thumb{transform:translate(-50%,-50%) scale(1)}

/* Seek preview */
#sp{position:absolute;bottom:calc(100% + 16px);transform:translateX(-50%);
  pointer-events:none;z-index:70;display:none;flex-direction:column;align-items:center;gap:4px}
#sp.show{display:flex}
#sp-img{width:152px;height:86px;background:#111 center/cover no-repeat;
  border:2px solid var(--gold);border-radius:6px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.6)}
#sp-img.no-th{background-image:none!important;background-color:#1a1500}
#sp-t{font-size:11px;color:#fff;background:rgba(0,0,0,.85);padding:2px 8px;border-radius:4px}

/* Buttons row */
#btn-row{display:flex;align-items:center;gap:2px;width:100%;flex-wrap:nowrap}
.cb{background:none;border:none;color:rgba(255,255,255,.85);cursor:pointer;
  width:38px;height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:7px;flex-shrink:0;position:relative;
  transition:background .14s,color .14s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation}
.cb:hover{background:rgba(201,162,39,.13);color:var(--gold2)}
.cb.on{color:var(--gold2)}
.cb svg{width:20px;height:20px;fill:currentColor;pointer-events:none}
.sp{flex:1}

/* Tooltip */
.cb::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 5px);left:50%;
  transform:translateX(-50%);background:rgba(0,0,0,.84);color:#eee;font-size:11px;
  padding:3px 8px;border-radius:4px;white-space:nowrap;pointer-events:none;
  opacity:0;transition:opacity .14s}
.cb:hover::after{opacity:1}

/* Volume */
#vol-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
#vol-sl{-webkit-appearance:none;width:72px;height:4px;border-radius:4px;
  background:linear-gradient(to right,var(--gold) var(--p,50%),rgba(255,255,255,.14) var(--p,50%));
  outline:none;cursor:pointer}
#vol-sl::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--gold2);box-shadow:0 0 4px var(--gold)}

/* Quality */
#q-wrap{position:relative;flex-shrink:0}
#q-lbl{padding:4px 10px;border:1px solid var(--bd);border-radius:5px;
  background:var(--glass);color:var(--gold2);
  font-size:11px;font-weight:700;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:transparent;letter-spacing:.3px}
#q-dd{display:none;position:absolute;bottom:calc(100% + 8px);right:0;
  background:var(--glass2);border:1px solid var(--bd);
  backdrop-filter:blur(18px);border-radius:var(--r);
  min-width:170px;overflow:hidden;z-index:65;
  box-shadow:0 8px 32px rgba(0,0,0,.6)}
#q-dd.open{display:block}
.qi{padding:10px 14px;font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:8px;
  border-bottom:1px solid rgba(201,162,39,.07);transition:background .1s;
  -webkit-tap-highlight-color:transparent}
.qi:last-child{border:none}
.qi:hover,.qi:active{background:rgba(201,162,39,.13)}
.qi.cur{color:var(--gold2);font-weight:600}
.qb{font-size:10px;padding:2px 5px;border-radius:3px;
  background:rgba(201,162,39,.16);color:var(--gold);text-transform:uppercase}
.qi-chk{margin-left:auto;width:14px;height:14px;fill:var(--gold2);flex-shrink:0;display:none}
.qi.cur .qi-chk{display:block}

/* Panels */
.panel{display:none;position:absolute;
  background:var(--glass2);border:1px solid var(--bd);
  backdrop-filter:blur(20px);border-radius:var(--r);
  padding:14px 16px;z-index:60;pointer-events:all;min-width:240px;
  box-shadow:0 8px 40px rgba(0,0,0,.7)}
.panel.open{display:block}
#pnl-set,#pnl-cc{bottom:76px;right:14px}
.ph{font-size:11px;color:var(--gold);text-transform:uppercase;
  letter-spacing:.8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.sr{display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid rgba(201,162,39,.06);font-size:13px}
.sr:last-child{border:none}
.sl{color:#bbb}
.tog{width:36px;height:19px;border-radius:10px;background:rgba(255,255,255,.13);
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--gold3)}
.tog::after{content:'';position:absolute;top:2.5px;left:2.5px;
  width:14px;height:14px;border-radius:50%;background:#eee;transition:left .2s}
.tog.on::after{left:19.5px}
.snum{background:none;border:1px solid var(--bd);color:var(--gold2);
  border-radius:4px;width:52px;padding:3px 5px;font-size:12px;text-align:center}
.ssel{background:rgba(8,6,0,.75);border:1px solid var(--bd);color:var(--gold2);
  border-radius:4px;padding:3px 5px;font-size:12px;cursor:pointer}
.cc-back{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--gold);
  font-size:12px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.cc-back svg{width:14px;height:14px;fill:var(--gold)}

/* Subtitles */
#sub-box{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);
  text-align:center;pointer-events:none;z-index:28;max-width:92%}
#sub-txt{display:inline;font-size:22px;color:#fff;
  background:rgba(0,0,0,.76);padding:3px 8px;border-radius:4px;
  line-height:1.55;white-space:pre-wrap;text-shadow:0 1px 3px #000}

/* Mobile */
@media(max-width:640px),(pointer:coarse){
  #skip{bottom:84px;right:10px;font-size:13px;padding:8px 14px}
  #ctrl{padding:0 8px 12px;gap:4px}
  .tt{font-size:11px;min-width:34px}
  #seek{height:36px}
  .cb{width:40px;height:40px}
  .cb svg{width:22px;height:22px}
  .cb::after{display:none}
  #vol-sl{width:56px}
  #sub-box{bottom:76px}
  #sub-txt{font-size:17px}
  .panel{left:8px;right:8px;min-width:unset;bottom:72px}
  #sp-img{width:120px;height:68px}
}
</style>
</head>
<body>
<div id="W">

  <video id="V" preload="auto" playsinline autoplay muted></video>

  <!-- Mute banner (shown until user interacts) -->
  <div id="mute-bar">
    <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>
    Tap to unmute
  </div>

  <!-- Ripples -->
  <div class="dtap" id="dtap-l">
    <div class="ring"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></div>
    <span class="lbl">-10s</span>
  </div>
  <div class="dtap" id="dtap-r">
    <div class="ring"><svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></div>
    <span class="lbl">+10s</span>
  </div>

  <!-- Volume swipe indicator -->
  <div id="vi">
    <svg id="vi-ico" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    <span id="vi-val">100%</span>
  </div>

  <!-- Skip intro/outro -->
  <div id="skip">
    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm8.5-6L23 6v12l-8.5-6z"/></svg>
    <span id="skip-lbl">Skip Intro</span>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <!-- Spinner -->
  <div id="spinner">
    <svg viewBox="0 0 24 24" fill="none" stroke="#C9A227" stroke-width="2.5">
      <circle cx="12" cy="12" r="10" stroke-opacity=".18"/>
      <path d="M12 2a10 10 0 0 1 10 10"/>
    </svg>
  </div>

  <!-- Flash -->
  <div id="flash"><svg viewBox="0 0 24 24"><path id="flash-p" d="M8 5v14l11-7z"/></svg></div>

  <!-- Next episode overlay -->
  <div id="nxt">
    <div id="nxt-info"></div>
    <button id="btn-nxt">
      <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm8.5-6L23 6v12l-8.5-6z"/></svg>
      Next Episode
    </button>
    <button id="btn-rpl">
      <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      Replay
    </button>
  </div>
  <div id="ap-bar"></div>

  <!-- Subtitles -->
  <div id="sub-box"><span id="sub-txt"></span></div>

  <!-- Settings panel -->
  <div class="panel" id="pnl-set">
    <div class="ph">Settings</div>
    <div class="sr">
      <span class="sl">Speed</span>
      <select class="ssel" id="sel-spd">
        <option value="0.25">0.25×</option><option value="0.5">0.5×</option>
        <option value="0.75">0.75×</option><option value="1" selected>1×</option>
        <option value="1.25">1.25×</option><option value="1.5">1.5×</option>
        <option value="1.75">1.75×</option><option value="2">2×</option>
      </select>
    </div>
    <div class="sr"><span class="sl">Autoskip intros</span><div class="tog on" id="tog-skip"></div></div>
    <div class="sr"><span class="sl">Autoplay next</span><div class="tog" id="tog-ap"></div></div>
    <div class="sr">
      <span class="sl">Skip padding (s)</span>
      <input class="snum" type="number" id="inp-pad" value="2" min="0" max="10">
    </div>
    <div class="sr" style="cursor:pointer" id="open-cc">
      <span class="sl">Subtitle settings →</span>
      <svg style="width:14px;height:14px;fill:#888" viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6-6-6z"/></svg>
    </div>
  </div>

  <!-- CC panel -->
  <div class="panel" id="pnl-cc">
    <div class="cc-back" id="cc-back">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back
    </div>
    <div class="ph">Subtitles</div>
    <div class="sr"><span class="sl">Track</span>
      <select class="ssel" id="cc-track"><option value="-1">Off</option></select></div>
    <div class="sr"><span class="sl">Size</span>
      <select class="ssel" id="cc-sz">
        <option value="14">Small</option><option value="18">Normal</option>
        <option value="22" selected>Medium</option><option value="28">Large</option><option value="34">XL</option>
      </select></div>
    <div class="sr"><span class="sl">Color</span>
      <input type="color" id="cc-col" value="#ffffff"
        style="width:36px;height:24px;border:1px solid var(--bd);border-radius:4px;background:none;cursor:pointer"></div>
    <div class="sr"><span class="sl">BG opacity</span>
      <input class="snum" type="number" id="cc-bgop" value="75" min="0" max="100"></div>
    <div class="sr"><span class="sl">Font</span>
      <select class="ssel" id="cc-font">
        <option value="'Segoe UI',sans-serif">Default</option>
        <option value="Arial,sans-serif">Arial</option>
        <option value="Georgia,serif">Georgia</option>
        <option value="'Courier New',monospace">Mono</option>
      </select></div>
    <div class="sr"><span class="sl">Position</span>
      <select class="ssel" id="cc-pos">
        <option value="bottom">Bottom</option><option value="top">Top</option>
      </select></div>
  </div>

  <!-- Controls bar -->
  <div id="ctrl">
    <div id="seek-row">
      <span class="tt" id="tc">0:00</span>
      <div id="seek">
        <div id="sp">
          <div id="sp-img" class="no-th"></div>
          <div id="sp-t">0:00</div>
        </div>
        <div id="seek-bg">
          <div id="seek-buf"></div>
          <div id="seek-fill"></div>
          <div id="seek-thumb"></div>
        </div>
      </div>
      <span class="tt" id="td">0:00</span>
    </div>

    <div id="btn-row">
      <button class="cb" id="btn-play" data-tip="Play (Space)">
        <svg viewBox="0 0 24 24"><path id="play-ico" d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="cb" id="btn-m10" data-tip="-10s (←)">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8zm-1.1 11H10v-3.26L9 13.14v-.85l1.85-.66h.05V16zm2.76-2.28c.14-.18.21-.47.21-.87v-.72c0-.4-.07-.69-.21-.87s-.35-.28-.63-.28-.49.09-.63.28-.21.47-.21.87v.72c0 .4.07.69.21.87.14.18.35.28.63.28s.49-.09.63-.28zM13 11.1c.28-.31.7-.47 1.26-.47s.98.16 1.26.47.43.77.43 1.39v.72c0 .61-.14 1.08-.43 1.39s-.7.47-1.26.47-.98-.16-1.26-.47-.43-.77-.43-1.39v-.72c0-.62.14-1.08.43-1.39z"/></svg>

        <svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8zm-1.1 11H10v-3.26L9 13.14v-.85l1.85-.66h.05V16zm4.76-4.28c.14-.18.21-.47.21-.87v-.72c0-.4-.07-.69-.21-.87s-.35-.28-.63-.28-.49.09-.63.28-.21.47-.21.87v.72c0 .4.07.69.21.87.14.18.35.28.63.28s.49-.09.63-.28zM15 11.1c.28-.31.7-.47 1.26-.47s.98.16 1.26.47.43.77.43 1.39v.72c0 .61-.14 1.08-.43 1.39s-.7.47-1.26.47-.98-.16-1.26-.47-.43-.77-.43-1.39v-.72c0-.62.14-1.08.43-1.39z"/></svg>
      </button>

        <button class="cb" id="btn-mute" data-tip="Mute (M)">
          <svg viewBox="0 0 24 24"><path id="vol-ico" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

</div>
<script>
/* ═══════════════════════════════════════════════════════════
   Injected data
═══════════════════════════════════════════════════════════ */
const ED     = {{ episode_json | safe }};
const MAL_ID = {{ mal_id }};
const BASE   = window.location.origin;

/* ═══════════════════════════════════════════════════════════
   Helpers
═══════════════════════════════════════════════════════════ */
const fmt = s => {
  if (!isFinite(s)) return '0:00';
  s = Math.floor(s);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  return h ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
           : `${m}:${String(sec).padStart(2,'0')}`;
};
const $ = id => document.getElementById(id);
const emit = (name, detail) =>
  window.dispatchEvent(new CustomEvent('player:'+name, {detail, bubbles:false}));

let _toastT;
const toast = (msg, ms=2200) => {
  const el=$('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT=setTimeout(()=>el.classList.remove('show'),ms);
};

/* ═══════════════════════════════════════════════════════════
   Seek poster (lazy)
═══════════════════════════════════════════════════════════ */
const Poster = {
  _url:'',
  init(url){
    if(!url)return;
    const img=new Image();
    img.onload=()=>{
      this._url=url;
      // Pre-apply poster as background on the seek preview image div
      const el=$('sp-img');
      if(el){el.style.backgroundImage=`url('${url}')`;el.classList.remove('no-th');}
    };
    img.onerror=()=>{};
    img.src=url;
  },
  apply(el){
    if(this._url){
      el.style.backgroundImage=`url('${this._url}')`;
      el.classList.remove('no-th');
    } else {
      el.classList.add('no-th');
    }
  }
};

/* ═══════════════════════════════════════════════════════════
   Thumbnail VTT
═══════════════════════════════════════════════════════════ */
const Thumb = {
  cues:[],
  load(url){
    fetch(url).then(r=>r.text()).then(t=>{this.cues=this._parse(t,url);}).catch(()=>{});
  },
  _parse(txt,base){
    const dir=base.substring(0,base.lastIndexOf('/')+1);
    const toS=s=>{const p=s.trim().split(':');return p.length===3?+p[0]*3600+(+p[1])*60+parseFloat(p[2]):(+p[0])*60+parseFloat(p[1]);};
    return txt.split(/\n\n+/).reduce((a,b)=>{
      const lines=b.trim().split('\n'),i=lines.findIndex(l=>l.includes('-->'));
      if(i<0)return a;
      const[st,et]=lines[i].split('-->').map(toS);
      const raw=lines.slice(i+1).join('').trim();
      if(!raw)return a;
      const m=raw.match(/#xywh=(\d+),(\d+),(\d+),(\d+)/);
      const imgUrl=m?raw.split('#')[0]:raw;
      const url=imgUrl.startsWith('http')?imgUrl:dir+imgUrl;
      a.push({st,et,url,x:m?+m[1]:0,y:m?+m[2]:0,w:m?+m[3]:0,h:m?+m[4]:0});
      return a;
    },[]);
  },
  apply(t,el){
    const c=this.cues.find(c=>t>=c.st&&t<=c.et);
    if(!c){Poster.apply(el);return;}
    el.classList.remove('no-th');
    el.style.backgroundImage=`url('${c.url}')`;
    if(c.w){el.style.backgroundPosition=`-${c.x}px -${c.y}px`;el.style.backgroundSize='auto';}
    else{el.style.backgroundPosition='center';el.style.backgroundSize='cover';}
  }
};

/* ═══════════════════════════════════════════════════════════
   VTT subtitle parser
═══════════════════════════════════════════════════════════ */
function parseVTT(txt){
  return txt.split(/\n\n+/).reduce((a,b)=>{
    const lines=b.trim().split('\n'),i=lines.findIndex(l=>l.includes('-->'));
    if(i<0)return a;
    const toS=s=>{const p=s.trim().replace(',','.').split(':');return p.length===3?+p[0]*3600+(+p[1])*60+parseFloat(p[2]):(+p[0])*60+parseFloat(p[1]);};
    const[start,end]=lines[i].split('-->').map(toS);
    const text=lines.slice(i+1).join('\n').replace(/<[^>]+>/g,'').trim();
    if(text)a.push({start,end,text});
    return a;
  },[]);
}

/* ═══════════════════════════════════════════════════════════
   Subtitle manager (CCM)
═══════════════════════════════════════════════════════════ */
const CCM = {
  tracks:[],idx:-1,
  cfg:{size:22,color:'#ffffff',bgOp:75,font:"'Segoe UI',sans-serif",pos:'bottom'},
  add(label,lang,url){
    const i=this.tracks.length;
    this.tracks.push({label,lang,url,cues:[]});
    fetch(url).then(r=>r.text()).then(t=>{this.tracks[i].cues=parseVTT(t);});
    const sel=$('cc-track'),o=document.createElement('option');
    o.value=i;o.textContent=`${label} (${lang})`;sel.appendChild(o);
    emit('cctrack',{index:i,label,lang});
    return i;
  },
  setActive(i){
    this.idx=parseInt(i);$('cc-track').value=i;
    emit('ccchange',{index:i});
  },
  render(t){
    const span=$('sub-txt');
    if(this.idx<0||!P.ccOn){span.textContent='';return;}
    const trk=this.tracks[this.idx];
    if(!trk){span.textContent='';return;}
    const cue=trk.cues.find(c=>t>=c.start&&t<=c.end);
    span.textContent=cue?cue.text:'';
    const s=this.cfg;
    span.style.cssText=`font-size:${s.size}px;color:${s.color};font-family:${s.font};background:rgba(0,0,0,${(s.bgOp/100).toFixed(2)})`;
    $('sub-box').style.cssText=s.pos==='top'
      ?'bottom:auto;top:54px;left:50%;transform:translateX(-50%)'
      :'top:auto;bottom:90px;left:50%;transform:translateX(-50%)';
  },
  sync(){
    this.cfg.size  = +$('cc-sz').value;
    this.cfg.color = $('cc-col').value;
    this.cfg.bgOp  = +$('cc-bgop').value;
    this.cfg.font  = $('cc-font').value;
    this.cfg.pos   = $('cc-pos').value;
    emit('ccsettings',{cfg:this.cfg});
  }
};

/* ═══════════════════════════════════════════════════════════
   Watch-time tracker
   Fires player:watchtime every 15 s of actual playback
═══════════════════════════════════════════════════════════ */
const WatchTime = {
  _total:0, _seg:0, _last:null, _reported:0,
  start(){if(this._last!==null)return;this._last=Date.now();},
  stop(){
    if(this._last===null)return;
    this._seg+=Date.now()-this._last;
    this._last=null;
    this._flush();
  },
  tick(){
    if(this._last===null)return;
    const now=Date.now();
    this._seg+=now-this._last;
    this._last=now;
    this._flush();
  },
  _flush(){
    const secs=Math.floor(this._seg/1000);
    if(secs-this._reported>=15){
      this._total+=this._seg;this._seg=0;this._reported=0;this._last=this._last===null?null:Date.now();
      emit('watchtime',{seconds:Math.floor(this._total/1000),token:ED.qualities?.[P.qIdx]?.stream_token});
    }
  },
  total(){return Math.floor(this._total/1000);}
};

/* ═══════════════════════════════════════════════════════════
   localStorage Cache — resume position + user preferences
═══════════════════════════════════════════════════════════ */
const Cache = {
  _pk:'tsk_prefs',
  // Per-episode key uses slug+season+episode so it survives quality switches
  _rk(){return`tsk_r_${ED.slug}_${ED.season}_${ED.episode}`;},
  prefs(){
    try{return JSON.parse(localStorage.getItem(this._pk)||'{}')}catch(_){return{};}
  },
  savePrefs(obj){
    try{localStorage.setItem(this._pk,JSON.stringify({...this.prefs(),...obj}));}catch(_){}
  },
  savePos(t){
    try{localStorage.setItem(this._rk(),String(Math.floor(t)));}catch(_){}
  },
  getPos(){
    try{return parseFloat(localStorage.getItem(this._rk())||'0')||0;}catch(_){return 0;}
  },
  clearPos(){
    try{localStorage.removeItem(this._rk());}catch(_){}
  },
};

/* ═══════════════════════════════════════════════════════════
   Player
═══════════════════════════════════════════════════════════ */
class Player {
  constructor(){
    this.V          = $('V');
    this.W          = $('W');
    this.qualities  = ED.qualities||[];
    this.qIdx       = 0;
    this.skipTimes  = [];
    this.autoskip   = true;
    this.autoplay   = false;
    this.skipPad    = 2;
    this.ccOn       = false;
    this._volPct    = 100;
    this._seekDrag  = false;
    this._wasPaused = false;
    this._actx=this._gain=this._asrc=null;
    this._skipShown = null;
    this._apTimer   = null;
    this._unmuted   = false;
    this._rafPending= false;
    this._resumeDone= false;

    this._buildQ();
    this._bindVideo();
    this._bindSeek();
    this._bindControls();
    this._bindTouch();
    this._bindKeys();
    this._bindMessages();
    this._applyPrefs();
    this._startAutoplay();

    if(MAL_ID)this._fetchSkip();
    if(ED.thumbnails_url)Thumb.load(ED.thumbnails_url);
    if(ED.poster_url)Poster.init(ED.poster_url);

    emit('ready',{episode:ED,qualities:this.qualities});
  }

  /* ── Restore saved preferences ── */
  _applyPrefs(){
    const p=Cache.prefs();
    // Volume
    if(p.volume!=null)this.setVol(p.volume);
    // Toggles
    if(p.autoskip!=null)this.setAutoskip(p.autoskip);
    if(p.autoplay!=null)this.setAutoplay(p.autoplay);
    // Last-used quality index for this anime (if still valid)
    if(p.qIdx!=null&&p.qIdx>0&&p.qIdx<this.qualities.length){
      this.qIdx=p.qIdx;
      this._loadSrc(p.qIdx,true);
    }
  }

  /* ── Auto-start (muted) ── */
  _startAutoplay(){
    const V=this.V,bar=$('mute-bar');
    // Load first quality immediately
    this._loadSrc(this.qIdx,true);

    const tryPlay=()=>{
      V.play().then(()=>{
        bar.classList.add('gone');
      }).catch(()=>{
        // Already muted autoplay might still fail on some browsers — show banner
      });
    };

    V.addEventListener('loadedmetadata',tryPlay,{once:true});
    V.addEventListener('canplay',tryPlay,{once:true});
    setTimeout(tryPlay,300);

    // Banner click → unmute
    bar.addEventListener('click',()=>this._unmute());
    // Any click on player → unmute
    this.W.addEventListener('click',()=>this._unmute(),{once:true});
    this.W.addEventListener('touchend',()=>this._unmute(),{once:true});
  }

  _unmute(){
    if(this._unmuted)return;
    this._unmuted=true;
    this.V.muted=false;
    this.setVol(100);
    $('mute-bar').classList.add('gone');
    emit('unmuted',{});
  }

  /* ── Quality ── */
  _buildQ(){
    const dd=$('q-dd');
    dd.innerHTML='';
    this.qualities.forEach((q,i)=>{
      const el=document.createElement('div');
      el.className='qi'+(i===this.qIdx?' cur':'');
      el.innerHTML=
        `<span>${q.quality.toUpperCase()}</span>`+
        `<span class="qb">${q.audio_type}</span>`+
        `<svg class="qi-chk" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>`;
      el.addEventListener('click',e=>{
        e.stopPropagation();
        this.setQuality(i);
        dd.classList.remove('open');
      });
      dd.appendChild(el);
    });
    const q=this.qualities[this.qIdx];
    $('q-lbl').textContent=q?q.quality.toUpperCase():'—';
  }

  _loadSrc(idx,initial=false){
    const q=this.qualities[idx];
    if(!q)return;
    const t=this.V.currentTime,wasPaused=this.V.paused;
    this.V.src=BASE+'/stream/'+q.stream_token;
    this.V.load();
    if(!initial){
      this.V.addEventListener('loadedmetadata',()=>{
        if(t>0.5)this.V.currentTime=t;
        if(!wasPaused)this.V.play().catch(()=>{});
      },{once:true});
    }
    this._buildQ();
    emit('qualitychange',{index:idx,quality:q.quality,audioType:q.audio_type,token:q.stream_token});
  }

  /* ── AniSkip ── */
  async _fetchSkip(){
    try{
      const r=await fetch(`/api/aniskip?mal_id=${MAL_ID}&episode=${ED.episode}&episode_length=0`);
      if(!r.ok)return;
      const d=await r.json();
      this.skipTimes=d.results||[];
      emit('skiptimes',{skipTimes:this.skipTimes});
    }catch(_){}
  }

  _checkSkip(t){
    const seg=this.skipTimes.find(s=>t>=s.startTime&&t<s.endTime-this.skipPad);
    const btn=$('skip');
    if(seg){
      if(this._skipShown!==seg.type){
        this._skipShown=seg.type;
        $('skip-lbl').textContent=seg.type==='op'?'Skip Intro':'Skip Outro';
        btn.style.display='flex';
        if(this.autoskip)this._doSkip(seg);
      }
    }else{
      this._skipShown=null;
      btn.style.display='none';
    }
  }

  _doSkip(seg){
    this.V.currentTime=seg.endTime;
    toast((seg.type==='op'?'Intro':'Outro')+' skipped');
    emit('skipused',{type:seg.type,endTime:seg.endTime});
  }

  /* ── Video events ── */
  _bindVideo(){
    const V=this.V;
    let lastEmitTime=-1;

    // Throttle DOM updates through rAF — prevents jank on slow devices
    let _lastSaved=0;
    V.addEventListener('timeupdate',()=>{
      if(this._rafPending)return;
      this._rafPending=true;
      requestAnimationFrame(()=>{
        this._rafPending=false;
        const t=V.currentTime,d=V.duration||0;
        $('tc').textContent=fmt(t);
        const p=d?t/d*100:0;
        $('seek-fill').style.width=p+'%';
        $('seek-thumb').style.left=p+'%';
        this._checkSkip(t);
        CCM.render(t);
        WatchTime.tick();
        // Save resume position every 10 s of playback
        if(t-_lastSaved>=10){_lastSaved=t;Cache.savePos(t);}
        // Emit timeupdate to parent every second
        if(Math.floor(t)!==lastEmitTime){
          lastEmitTime=Math.floor(t);
          emit('timeupdate',{currentTime:t,duration:d,percent:p});
          this._postUp({type:'timeupdate',currentTime:t,duration:d,percent:p});
        }
      });
    });

    V.addEventListener('progress',()=>{
      if(!V.buffered.length||!V.duration)return;
      $('seek-buf').style.width=(V.buffered.end(V.buffered.length-1)/V.duration*100)+'%';
    });

    V.addEventListener('durationchange',()=>{$('td').textContent=fmt(V.duration);});

    // Resume from saved position (once per page load, after metadata is known)
    V.addEventListener('loadedmetadata',()=>{
      if(this._resumeDone)return;
      this._resumeDone=true;
      const saved=Cache.getPos();
      if(saved>10&&saved<V.duration-15){
        V.currentTime=saved;
        toast('Resumed from '+fmt(saved),3000);
      }
    },{once:false});

    // Show spinner only while actually loading (not on buffered seeks)
    let _spinT;
    const showSpin=()=>{
      clearTimeout(_spinT);
      // Delay: if canplay fires within 400ms don't flash the spinner
      _spinT=setTimeout(()=>$('spinner').style.display='flex',400);
    };
    const hideSpin=()=>{
      clearTimeout(_spinT);
      $('spinner').style.display='none';
    };
    V.addEventListener('waiting',showSpin);
    V.addEventListener('canplay',hideSpin);
    V.addEventListener('canplaythrough',hideSpin);
    V.addEventListener('seeked',hideSpin);
    // Safety net: never show spinner more than 8s without recovery
    V.addEventListener('waiting',()=>setTimeout(hideSpin,8000));

    V.addEventListener('playing',()=>{
      hideSpin();
      this._syncPlay();
      WatchTime.start();
      emit('play',{currentTime:V.currentTime});
      this._postUp({type:'play',currentTime:V.currentTime});
    });
    V.addEventListener('pause',()=>{
      this._syncPlay();
      WatchTime.stop();
      Cache.savePos(V.currentTime);
      emit('pause',{currentTime:V.currentTime});
      this._postUp({type:'pause',currentTime:V.currentTime});
    });
    V.addEventListener('ended',()=>{
      this._syncPlay();
      WatchTime.stop();
      Cache.clearPos();
      emit('ended',{watchedSeconds:WatchTime.total()});
      this._postUp({type:'ended',watchedSeconds:WatchTime.total()});
      this._onEnded();
    });
    V.addEventListener('error',()=>{
      emit('error',{code:V.error?.code,message:V.error?.message});
    });
    V.addEventListener('seeking',()=>{
      emit('seeking',{currentTime:V.currentTime});
    });
    V.addEventListener('seeked',()=>{
      emit('seeked',{currentTime:V.currentTime});
    });
  }

  /* ── postMessage bridge (for iframe embeds) ── */
  _postUp(data){
    try{window.parent.postMessage({source:'tsukuyomi-player',...data},'*');}catch(_){}
  }

  _onEnded(){
    const nextToken=ED.next_token;
    if(nextToken){
      $('nxt-info').textContent=
        `${ED.anime_name} · S${String(ED.season).padStart(2,'0')}E${String(ED.episode+1).padStart(2,'0')}`;
    }else{
      $('nxt-info').textContent='No next episode.';
    }
    $('nxt').classList.add('show');
    if(this.autoplay&&nextToken){
      this._startAP(nextToken);
    }else{
      emit('requestnext',{hasNext:!!nextToken,nextToken});
    }
  }

  _startAP(nextToken){
    clearTimeout(this._apTimer);
    const bar=$('ap-bar');
    bar.style.display='block';bar.style.transition='none';bar.style.transform='scaleX(0)';
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      bar.style.transition='transform 5s linear';bar.style.transform='scaleX(1)';
    }));
    this._apTimer=setTimeout(()=>{
      bar.style.display='none';
      $('nxt').classList.remove('show');
      window.location.href=BASE+'/player/'+nextToken;
    },5000);
  }

  _cancelAP(){clearTimeout(this._apTimer);$('ap-bar').style.display='none';}

  _syncPlay(){
    $('play-ico').setAttribute('d',this.V.paused?'M8 5v14l11-7z':'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
  }

  _syncVol(){
    const muted=this.V.muted||this._volPct===0;
    const d=muted
      ?'M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z'
      :'M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
    $('vol-ico').setAttribute('d',d);
    $('vi-ico').setAttribute('d',d);
  }

  /* ── Seek bar ── */
  _bindSeek(){
    const sb=$('seek-bg'),sw=$('seek');
    const prev=$('sp'),pimg=$('sp-img'),ptim=$('sp-t');

    const pct=clientX=>{
      const r=sb.getBoundingClientRect();
      return Math.max(0,Math.min(1,(clientX-r.left)/r.width));
    };
    const showPrev=(p,clientX)=>{
      const t=p*(this.V.duration||0);
      ptim.textContent=fmt(t);
      Thumb.apply(t,pimg);
      const r=sb.getBoundingClientRect();
      const x=Math.max(76,Math.min(r.width-76,clientX-r.left));
      prev.style.left=x+'px';
      prev.classList.add('show');
    };
    const hidePrev=()=>prev.classList.remove('show');

    sw.addEventListener('mousemove',e=>{if(!this._seekDrag)showPrev(pct(e.clientX),e.clientX);});
    sw.addEventListener('mouseleave',()=>{if(!this._seekDrag)hidePrev();});
    sw.addEventListener('mousedown',e=>{
      e.preventDefault();
      this._seekDrag=true;this._wasPaused=this.V.paused;
      this.V.pause();sw.classList.add('active');
      this.V.currentTime=pct(e.clientX)*(this.V.duration||0);
      showPrev(pct(e.clientX),e.clientX);
    });
    window.addEventListener('mousemove',e=>{
      if(!this._seekDrag)return;
      this.V.currentTime=pct(e.clientX)*(this.V.duration||0);
      showPrev(pct(e.clientX),e.clientX);
    });
    window.addEventListener('mouseup',()=>{
      if(!this._seekDrag)return;
      this._seekDrag=false;sw.classList.remove('active');hidePrev();
      if(!this._wasPaused)this.V.play().catch(()=>{});
    });
    sw.addEventListener('touchstart',e=>{
      e.stopPropagation();
      e.preventDefault();
      this._seekDrag=true;this._wasPaused=this.V.paused;
      this.V.pause();sw.classList.add('active');
      const t=e.touches[0];
      this.V.currentTime=pct(t.clientX)*(this.V.duration||0);
      showPrev(pct(t.clientX),t.clientX);
    },{passive:false});
    sw.addEventListener('touchmove',e=>{
      e.preventDefault();
      const t=e.touches[0];
      this.V.currentTime=pct(t.clientX)*(this.V.duration||0);
      showPrev(pct(t.clientX),t.clientX);
    },{passive:false});
    sw.addEventListener('touchend',e=>{
      e.preventDefault();
      if(!this._seekDrag)return;
      this._seekDrag=false;sw.classList.remove('active');hidePrev();
      if(!this._wasPaused)this.V.play().catch(()=>{});
    },{passive:false});
    // Also handle fingers that slide off the seek bar
    window.addEventListener('touchmove',e=>{
      if(!this._seekDrag)return;
      e.preventDefault();
      const t=e.touches[0];
      this.V.currentTime=pct(t.clientX)*(this.V.duration||0);
      showPrev(pct(t.clientX),t.clientX);
    },{passive:false,capture:true});
    window.addEventListener('touchend',()=>{
      if(!this._seekDrag)return;
      this._seekDrag=false;sw.classList.remove('active');hidePrev();
      if(!this._wasPaused)this.V.play().catch(()=>{});
    });
  }

  /* ── Controls ── */
  _bindControls(){
    const W=this.W,V=this.V;
    let hideT;
    const showUI=()=>{
      W.classList.add('ui');
      clearTimeout(hideT);
      hideT=setTimeout(()=>{if(!V.paused)W.classList.remove('ui');},3000);
    };
    W.addEventListener('mousemove',showUI);

    W.addEventListener('click',e=>{
      if(e.target.closest('#ctrl,#skip,.panel,#q-dd,#nxt,#mute-bar'))return;
      this._closePanels();
      this._togglePlay();
      const f=$('flash'),p=$('flash-p');
      p.setAttribute('d',V.paused?'M8 5v14l11-7z':'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
      f.classList.remove('go');void f.offsetWidth;f.classList.add('go');
    });

    W.addEventListener('dblclick',e=>{
      if(e.target.closest('#ctrl,#skip,.panel,#q-dd,#nxt,#mute-bar'))return;
      this._toggleFS();
    });

    $('btn-play').onclick=()=>this._togglePlay();
    $('btn-m10').onclick=()=>this.seek(V.currentTime-10);
    $('btn-p10').onclick=()=>this.seek(V.currentTime+10);
    $('btn-mute').onclick=()=>{
      if(!this._unmuted){this._unmute();return;}
      V.muted=!V.muted;this._syncVol();
    };

    const vs=$('vol-sl');
    vs.addEventListener('input',()=>this.setVol(+vs.value));

    $('skip').onclick=e=>{
      e.stopPropagation();
      const s=this.skipTimes.find(x=>V.currentTime>=x.startTime&&V.currentTime<x.endTime);
      if(s)this._doSkip(s);
    };

    const ql=$('q-lbl'),qd=$('q-dd');
    ql.addEventListener('click',e=>{
      e.stopPropagation();
      const was=qd.classList.contains('open');
      this._closePanels();
      if(!was)qd.classList.add('open');
    });
    qd.addEventListener('click',e=>e.stopPropagation());

    $('btn-cc').onclick=e=>{
      e.stopPropagation();
      this.ccOn=!this.ccOn;
      $('btn-cc').classList.toggle('on',this.ccOn);
      if(!this.ccOn)$('sub-txt').textContent='';
      emit('ccvisibility',{visible:this.ccOn});
    };

    $('btn-pip').onclick=async e=>{
      e.stopPropagation();
      if(!document.pictureInPictureEnabled){toast('PiP not supported');return;}
      document.pictureInPictureElement
        ?await document.exitPictureInPicture()
        :await V.requestPictureInPicture().catch(()=>toast('PiP failed'));
    };

    $('btn-set').addEventListener('click',e=>{
      e.stopPropagation();
      const was=$('pnl-set').classList.contains('open');
      this._closePanels();
      if(!was)$('pnl-set').classList.add('open');
    });
    $('pnl-set').addEventListener('click',e=>e.stopPropagation());

    $('open-cc').addEventListener('click',e=>{
      e.stopPropagation();
      $('pnl-set').classList.remove('open');
      $('pnl-cc').classList.add('open');
    });
    $('cc-back').addEventListener('click',e=>{
      e.stopPropagation();
      $('pnl-cc').classList.remove('open');
      $('pnl-set').classList.add('open');
    });
    $('pnl-cc').addEventListener('click',e=>e.stopPropagation());

    ['cc-sz','cc-col','cc-bgop','cc-font','cc-pos'].forEach(id=>
      $(id).addEventListener('input',()=>CCM.sync()));
    $('cc-track').onchange=e=>CCM.setActive(+e.target.value);

    $('tog-skip').onclick=e=>{e.stopPropagation();this.setAutoskip(!this.autoskip);};
    $('tog-ap').onclick=e=>{e.stopPropagation();this.setAutoplay(!this.autoplay);};
    $('inp-pad').onchange=e=>{this.skipPad=parseFloat(e.target.value)||0;};
    $('sel-spd').onchange=e=>{V.playbackRate=+e.target.value;emit('speedchange',{speed:V.playbackRate});};

    $('btn-fs').onclick=e=>{e.stopPropagation();this._toggleFS();};
    document.addEventListener('fullscreenchange',()=>{
      $('fs-ico').setAttribute('d',document.fullscreenElement
        ?'M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z'
        :'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
    });

    $('btn-nxt').onclick=e=>{
      e.stopPropagation();
      this._cancelAP();
      $('nxt').classList.remove('show');
      if(ED.next_token)window.location.href=BASE+'/player/'+ED.next_token;
      else emit('requestnext',{hasNext:false});
    };
    $('btn-rpl').onclick=e=>{
      e.stopPropagation();
      this._cancelAP();
      $('nxt').classList.remove('show');
      V.currentTime=0;V.play().catch(()=>{});
    };

    document.addEventListener('click',e=>{
      if(!e.target.closest('#q-wrap'))$('q-dd').classList.remove('open');
      if(!e.target.closest('#pnl-set,#btn-set,#pnl-cc,#open-cc')){
        $('pnl-set').classList.remove('open');
        $('pnl-cc').classList.remove('open');
      }
    });
  }

  /* ── Touch gestures ── */
  _bindTouch(){
    const W=this.W,V=this.V;
    let showT;
    W.addEventListener('touchstart',e=>{
      if(e.target.closest('.panel,#q-dd,#q-wrap,#btn-set,#skip,#nxt,#ctrl,#mute-bar'))return;
      W.classList.add('ui');
      clearTimeout(showT);
      showT=setTimeout(()=>{if(!V.paused)W.classList.remove('ui');},3500);
    },{passive:true});

    W.addEventListener('touchstart',e=>{
      if(!e.target.closest('#q-wrap,#q-dd'))$('q-dd').classList.remove('open');
      if(!e.target.closest('#pnl-set,#btn-set,#pnl-cc,#open-cc,#cc-back')){
        $('pnl-set').classList.remove('open');
        $('pnl-cc').classList.remove('open');
      }
    },{passive:true});

    let lastTap=0,lastSide=null;
    W.addEventListener('touchend',e=>{
      if(this._seekDrag)return;
      if(e.target.closest('#ctrl,#skip,.panel,#q-dd,#nxt,#btn-set,#q-wrap,#mute-bar'))return;
      const touch=e.changedTouches[0];
      const ww=window.innerWidth,x=touch.clientX,y=touch.clientY;
      if(y>=$('ctrl').getBoundingClientRect().top)return;
      const now=Date.now();
      const side=x<ww*0.38?'left':x>ww*0.62?'right':'center';
      if((now-lastTap)<350&&side===lastSide&&side!=='center'){
        lastTap=0;lastSide=null;
        if(side==='left'){this.seek(V.currentTime-10);this._ripple('dtap-l');}
        else{this.seek(V.currentTime+10);this._ripple('dtap-r');}
      }else{
        lastTap=now;lastSide=side;
        if(side==='center'){
          this._togglePlay();
          const f=$('flash'),p=$('flash-p');
          p.setAttribute('d',V.paused?'M8 5v14l11-7z':'M6 19h4V5H6v14zm8-14v14h4V5h-4z');
          f.classList.remove('go');void f.offsetWidth;f.classList.add('go');
        }
      }
    },{passive:true});

    // Center swipe = volume
    let sy=null,sv=null,swiping=false;
    W.addEventListener('touchstart',e=>{
      if(e.target.closest('#ctrl,.panel,#q-dd,#nxt,#mute-bar'))return;
      const t=e.touches[0],ww=window.innerWidth;
      if(t.clientX<ww*0.38||t.clientX>ww*0.62)return;
      if(t.clientY>=$('ctrl').getBoundingClientRect().top)return;
      sy=t.clientY;sv=this._volPct;swiping=false;
    },{passive:true});
    W.addEventListener('touchmove',e=>{
      if(sy===null)return;
      const dy=sy-e.touches[0].clientY;
      if(Math.abs(dy)>8)swiping=true;
      if(!swiping)return;
      const nv=Math.max(0,Math.min(200,Math.round(sv+dy/window.innerHeight*200)));
      this.setVol(nv);
      $('vi-val').textContent=nv+'%';
      $('vi').classList.add('show');
    },{passive:true});
    W.addEventListener('touchend',()=>{
      sy=null;swiping=false;
      setTimeout(()=>$('vi').classList.remove('show'),700);
    },{passive:true});
  }

  _ripple(id){
    const el=$(id);
    el.classList.remove('go');void el.offsetWidth;el.classList.add('go');
  }

  /* ── Keyboard ── */
  _bindKeys(){
    const V=this.V;
    document.addEventListener('keydown',e=>{
      if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName))return;
      switch(e.key){
        case ' ':case 'k':e.preventDefault();this._togglePlay();break;
        case 'ArrowRight':e.preventDefault();this.seek(V.currentTime+(e.shiftKey?30:10));break;
        case 'ArrowLeft':e.preventDefault();this.seek(V.currentTime-(e.shiftKey?30:10));break;
        case 'ArrowUp':e.preventDefault();this.setVol(Math.min(200,this._volPct+10));break;
        case 'ArrowDown':e.preventDefault();this.setVol(Math.max(0,this._volPct-10));break;
        case 'f':this._toggleFS();break;
        case 'm':if(this._unmuted){V.muted=!V.muted;this._syncVol();}else this._unmute();break;
        case 'c':$('btn-cc').click();break;
        case 'Escape':this._closePanels();break;
        case 'i':case 'o':{
          const s=this.skipTimes.find(x=>V.currentTime>=x.startTime&&V.currentTime<x.endTime);
          if(s)this._doSkip(s);break;
        }
      }
    });
  }

  /* ── postMessage API (inbound) ── */
  _bindMessages(){
    window.addEventListener('message',e=>{
      const d=e.data;if(!d?.type)return;
      switch(d.type){
        case 'play':         this.play();break;
        case 'pause':        this.pause();break;
        case 'seek':         if(d.time!=null)this.seek(d.time);break;
        case 'setvolume':    if(d.value!=null)this.setVol(d.value);break;
        case 'setautoskip':  this.setAutoskip(!!d.value);break;
        case 'setautoplay':  this.setAutoplay(!!d.value);break;
        case 'setquality':   if(d.index!=null)this.setQuality(d.index);break;
        case 'setskiptimes': if(Array.isArray(d.times))this.skipTimes=d.times;break;
        case 'addtrack':     if(d.url)CCM.add(d.label||'Sub',d.lang||'en',d.url);break;
        case 'loadthumbs':   if(d.url)Thumb.load(d.url);break;
        case 'getstate':
          e.source?.postMessage({source:'tsukuyomi-player',type:'state',state:this.getState()},'*');
          break;
      }
    });
  }

  /* ── Internals ── */
  _togglePlay(){
    if(this.V.paused)this.V.play().catch(()=>{});
    else this.V.pause();
  }
  _toggleFS(){
    if(!document.fullscreenElement){
      this.W.requestFullscreen().catch(()=>{});
      screen.orientation?.lock?.('landscape').catch(()=>{});
    }else{
      document.exitFullscreen();
      screen.orientation?.unlock?.();
    }
  }
  _closePanels(){
    ['q-dd','pnl-set','pnl-cc'].forEach(id=>$(id).classList.remove('open'));
  }

  /* ── Public API ── */
  play(){return this.V.play();}
  pause(){this.V.pause();}

  seek(t){
    this.V.currentTime=Math.max(0,Math.min(t,this.V.duration||0));
    emit('seek',{currentTime:this.V.currentTime});
  }

  setVol(pct){
    pct=Math.max(0,Math.min(200,Math.round(pct)));
    this._volPct=pct;
    const vs=$('vol-sl');
    vs.value=pct;vs.style.setProperty('--p',(pct/2)+'%');
    if(pct>100){
      this._ensureAudio();this.V.volume=1;this._gain.gain.value=pct/100;
    }else{
      if(this._gain)this._gain.gain.value=1;
      this.V.volume=pct/100;
    }
    this.V.muted=pct===0;
    this._syncVol();
    Cache.savePrefs({volume:pct});
    emit('volumechange',{volume:pct});
  }

  setQuality(idx){
    if(idx<0||idx>=this.qualities.length)return;
    this.qIdx=idx;this._loadSrc(idx);
    Cache.savePrefs({qIdx:idx});
    toast('Quality: '+this.qualities[idx].quality.toUpperCase());
  }

  setAutoskip(v){this.autoskip=!!v;$('tog-skip').className='tog'+(v?' on':'');Cache.savePrefs({autoskip:!!v});}
  setAutoplay(v){this.autoplay=!!v;$('tog-ap').className='tog'+(v?' on':'');Cache.savePrefs({autoplay:!!v});}

  addSubtitleTrack(url,lang='en',label='Subtitle'){return CCM.add(label,lang,url);}
  loadThumbnails(url){Thumb.load(url);}

  _ensureAudio(){
    if(this._actx)return;
    this._actx=new(window.AudioContext||window.webkitAudioContext)();
    this._gain=this._actx.createGain();
    this._asrc=this._actx.createMediaElementSource(this.V);
    this._asrc.connect(this._gain);
    this._gain.connect(this._actx.destination);
  }

  getState(){
    return{
      currentTime:this.V.currentTime,duration:this.V.duration,
      paused:this.V.paused,volume:this._volPct,muted:this.V.muted,
      qIndex:this.qIdx,quality:this.qualities[this.qIdx],
      autoskip:this.autoskip,autoplay:this.autoplay,
      skipTimes:this.skipTimes,ccOn:this.ccOn,
      watchedSeconds:WatchTime.total(),
    };
  }
}

window.P   = new Player();
window.CCM = CCM;
window.Thumb = Thumb;

/* ═══════════════════════════════════════════════════════════
   Site integration guide (postMessage events)

   OUTBOUND events (listen on your site):
   ──────────────────────────────────────
   window.addEventListener('message', e => {
     if (e.data.source !== 'tsukuyomi-player') return;
     switch (e.data.type) {
       case 'ready':       // player loaded, e.data.episode, e.data.qualities
       case 'play':        // e.data.currentTime
       case 'pause':       // e.data.currentTime
       case 'timeupdate':  // e.data.currentTime, duration, percent (every second)
       case 'ended':       // e.data.watchedSeconds
       case 'seek':        // e.data.currentTime
       case 'seeking':     // e.data.currentTime
       case 'seeked':      // e.data.currentTime
       case 'qualitychange': // e.data.index, quality, audioType, token
       case 'watchtime':   // e.data.seconds (every 15s of playback), token
       case 'skiptimes':   // e.data.skipTimes array from AniSkip
       case 'skipused':    // e.data.type ('op'/'ed'), endTime
       case 'unmuted':     // user unmuted
       case 'error':       // e.data.code, message
       case 'requestnext': // e.data.hasNext, nextToken
       case 'state':       // response to getstate message
     }
   });

   INBOUND commands (send from your site):
   ──────────────────────────────────────
   iframe.contentWindow.postMessage({ type: 'play' }, '*');
   iframe.contentWindow.postMessage({ type: 'pause' }, '*');
   iframe.contentWindow.postMessage({ type: 'seek', time: 120 }, '*');
   iframe.contentWindow.postMessage({ type: 'setvolume', value: 80 }, '*');
   iframe.contentWindow.postMessage({ type: 'setquality', index: 0 }, '*');
   iframe.contentWindow.postMessage({ type: 'setautoskip', value: true }, '*');
   iframe.contentWindow.postMessage({ type: 'setautoplay', value: true }, '*');
   iframe.contentWindow.postMessage({ type: 'addtrack', url: '...', label: 'English', lang: 'en' }, '*');
   iframe.contentWindow.postMessage({ type: 'loadthumbs', url: '...' }, '*');
   iframe.contentWindow.postMessage({ type: 'getstate' }, '*');

   EMBED example:
   ──────────────
   <iframe src="https://your-bot.repl.co/player/{token}"
     allow="autoplay; fullscreen; picture-in-picture"
     style="border:none;width:100%;aspect-ratio:16/9">
   </iframe>
═══════════════════════════════════════════════════════════ */
</script>
