services:
  tsukuyomi-bot:
    build: .
    container_name: tsukuyomi-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-5000}/status')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
